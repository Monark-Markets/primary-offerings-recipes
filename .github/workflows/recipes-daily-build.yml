name: Daily API Recipes Check

on:
  schedule:
    - cron: '0 21 * * *'  # 21:00 UTC daily
  workflow_dispatch:

jobs:
  run-recipes-test:
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ vars.BASE_URL }}
      ADMIN_BASE_URL: ${{ vars.ADMIN_BASE_URL }}
      ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
      API_KEY: ${{ secrets.API_KEY }}
      GITHUB_ENVIRONMENT: ${{ github.event.inputs.environment }}
      ALERTMANAGER_URL: ${{ vars.ALERTMANAGER_URL}}
      ALERTMANAGER_USER: ${{ secrets.ALERTMANAGER_USER }}
      ALERTMANAGER_PASSWORD: ${{ secrets.ALERTMANAGER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: |
          mvn -B clean package -Djar.finalName=recipes

      - name: Run Internal API Recipes
        run: java -cp target/recipes.jar com.monarkmarkets.internal.InternalRecipesRunner